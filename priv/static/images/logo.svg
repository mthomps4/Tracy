<?xml version="1.0" encoding="UTF-8"?>
<!-- Tracy mark — bold "T" centered in a minimal spider web.
     Designed to read at 24px (favicon), 36px (navbar), 96px+ (hero).
     Uses currentColor so it inherits the surrounding text color
     (typically the primary cyan in dark theme). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- web rings (outer to inner) -->
  <g stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.45">
    <circle cx="50" cy="50" r="46"/>
    <circle cx="50" cy="50" r="32"/>
    <circle cx="50" cy="50" r="18"/>
  </g>
  <!-- web radii (8-point) -->
  <g stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.55">
    <line x1="50" y1="4" x2="50" y2="96"/>
    <line x1="4" y1="50" x2="96" y2="50"/>
    <line x1="17.5" y1="17.5" x2="82.5" y2="82.5"/>
    <line x1="82.5" y1="17.5" x2="17.5" y2="82.5"/>
  </g>
  <!-- T mark (solid) -->
  <path d="M30 38 H70 V47 H55 V78 H45 V47 H30 Z"
        fill="currentColor"/>
  <!-- center dot (the spider) -->
  <circle cx="50" cy="50" r="2" fill="currentColor"/>
</svg>
